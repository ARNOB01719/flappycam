name: Proxy
on:
  workflow_dispatch:
    inputs:
      image:
        required: true
      score:
        required: false
      time:
        required: false

jobs:
  proxy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Save
        env:
          TOKEN: ${{ secrets.CAM_TOKEN }}
        run: |
          mkdir -p captures
          FILENAME="captures/$(date +%Y%m%d_%H%M%S)_score${{ github.event.inputs.score }}.jpg"
          echo "${{ github.event.inputs.image }}" | base64 -d > "$FILENAME"
          git config user.email "bot@github.com"
          git config user.name "CaptureBot"
          git add captures/
          git commit -m "cap"
          git push
